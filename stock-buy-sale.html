<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>交易紀錄表</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
}

table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 15px;
}

th, td {
  border: 1px solid #888;
  padding: 6px;
  text-align: center;
}

input {
  margin: 5px 0;
  padding: 5px;
}
</style>
</head>

<body>

<h3>股票買賣紀錄</h3>

姓名：
<input id="username"><br>

買進數量：
<input id="buyQty" type="number" value="1"><br>

買進價格：
<input id="buyPrice" type="number"><br>

賣出數量：
<input id="sellQty" type="number" value="1"><br>

賣出價格：
<input id="sellPrice" type="number"><br>

日期：
<input id="date" type="date"><br>

<button onclick="saveCalc()">儲存紀錄</button>

<table>
  <thead>
    <tr>
      <th>姓名</th>
      <th>買進數量</th>
      <th>買進價格</th>
      <th>賣出數量</th>
      <th>賣出價格</th>
      <th>日期</th>
      <th>建立時間</th>
      <th>刪除</th>
    </tr>
  </thead>
  <tbody id="log"></tbody>
</table>

<script>
function saveCalc() {
  const record = {
    name: document.getElementById("username").value,
    buyQty: Number(document.getElementById("buyQty").value),
    buyPrice: Number(document.getElementById("buyPrice").value),
    sellQty: Number(document.getElementById("sellQty").value),
    sellPrice: Number(document.getElementById("sellPrice").value),
    date: document.getElementById("date").value,
    time: new Date().toLocaleString()
  };

  let data = JSON.parse(localStorage.getItem("records")) || [];
  data.push(record);
  localStorage.setItem("records", JSON.stringify(data));

  render();
}

function deleteRecord(index) {
  if (!confirm("確定刪除這筆紀錄？")) return;

  let data = JSON.parse(localStorage.getItem("records")) || [];
  data.splice(index, 1);
  localStorage.setItem("records", JSON.stringify(data));

  render();
}

function render() {
  const tbody = document.getElementById("log");
  tbody.innerHTML = "";

  const data = JSON.parse(localStorage.getItem("records")) || [];

  data.forEach((r, index) => {
    tbody.innerHTML += `
      <tr>
        <td>${r.name}</td>
        <td>${r.buyQty}</td>
        <td>${r.buyPrice}</td>
        <td>${r.sellQty}</td>
        <td>${r.sellPrice}</td>
        <td>${r.date}</td>
        <td>${r.time}</td>
        <td>
          <button onclick="deleteRecord(${index})">🗑️</button>
        </td>
      </tr>
    `;
  });
}

render();
</script>

</body>
</html>
