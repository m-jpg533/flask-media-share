<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>手機航空監控中心</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>

<link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:black;
overflow:hidden;
font-family:monospace;
}

/* 3D 地球 */

#viewer{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

/* 上方監控面板 */

#topbar{

position:absolute;
top:0;
width:100%;
height:60px;

background:rgba(0,0,0,0.9);
color:#00ffaa;

display:flex;
justify-content:space-around;
align-items:center;

font-size:14px;

border-bottom:2px solid #00ffaa;

}

/* 下方資訊 */

#bottom{

position:absolute;
bottom:0;
width:100%;
height:90px;

background:rgba(0,0,0,0.9);
color:#00ffaa;

padding:10px;

font-size:14px;

border-top:2px solid #00ffaa;

}

</style>

</head>

<body>

<div id="topbar">

<div>✈ 航班 <span id="planeCount">0</span></div>

<div>🛰 衛星 <span id="satCount">0</span></div>

<div>📡 雷達 ONLINE</div>

</div>

<div id="viewer"></div>

<div id="bottom">

監控資訊：<span id="info">未選擇目標</span>

</div>

<script>

/* 建立 3D 地球 */

var viewer = new Cesium.Viewer("viewer",{

animation:false,
timeline:false,
baseLayerPicker:false,
fullscreenButton:false,
homeButton:false,
geocoder:false

})

/* 使用 OSM 地圖 */

viewer.imageryLayers.removeAll()

viewer.imageryLayers.addImageryProvider(

new Cesium.OpenStreetMapImageryProvider({

url:"https://tile.openstreetmap.org/"

})

)

/* 地球光照 */

viewer.scene.globe.enableLighting = true

/* 初始視角 */

viewer.camera.setView({

destination:Cesium.Cartesian3.fromDegrees(110,30,25000000)

})

/* ====================
飛機系統
==================== */

let planes=[]

function addPlane(lat,lon){

let plane = viewer.entities.add({

position:Cesium.Cartesian3.fromDegrees(lon,lat,10000),

billboard:{
image:"https://cdn-icons-png.flaticon.com/512/684/684908.png",
scale:0.06
}

})

planes.push(plane)

document.getElementById("planeCount").innerText=planes.length

}

/* 建立 300 架飛機 */

for(let i=0;i<1500;i++){

let lat=(Math.random()*180)-90
let lon=(Math.random()*360)-180

addPlane(lat,lon)

}

/* 飛機移動 */

function movePlanes(){

planes.forEach(p=>{

let pos=p.position.getValue(Cesium.JulianDate.now())

let carto=Cesium.Cartographic.fromCartesian(pos)

let lat=Cesium.Math.toDegrees(carto.latitude)
let lon=Cesium.Math.toDegrees(carto.longitude)

lat += Math.random()*0.2 - 0.1
lon += Math.random()*0.2 - 0.1

p.position = Cesium.Cartesian3.fromDegrees(lon,lat,10000)

})

}

setInterval(movePlanes,2000)

/* ====================
衛星系統
==================== */

let satellites=[]

function addSatellite(lat,lon){

let data={lat:lat,lon:lon}

let sat = viewer.entities.add({

position:new Cesium.CallbackProperty(function(){

data.lon += 0.5

if(data.lon>180){

data.lon=-180

}

return Cesium.Cartesian3.fromDegrees(

data.lon,
data.lat,
400000

)

},false),

billboard:{

image:"https://cdn-icons-png.flaticon.com/512/3212/3212608.png",

scale:0.15

}

})

satellites.push(sat)

document.getElementById("satCount").innerText=satellites.length

}

/* 建立 10 顆衛星 */

for(let i=0;i<10;i++){

let lat=(Math.random()*60)-30
let lon=(Math.random()*360)-180

addSatellite(lat,lon)

}

/* ====================
雷達掃描動畫
==================== */

let radar = viewer.entities.add({

position:Cesium.Cartesian3.fromDegrees(121,25,0),

ellipse:{

semiMinorAxis:600000,

semiMajorAxis:600000,

material:new Cesium.ColorMaterialProperty(

Cesium.Color.LIME.withAlpha(0.25)

)

}

})

/* ====================
點擊目標
==================== */

var handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas)

handler.setInputAction(function(click){

var picked = viewer.scene.pick(click.position)

if(picked){

document.getElementById("info").innerText="偵測到飛行物"

}

},Cesium.ScreenSpaceEventType.LEFT_CLICK)

</script>

</body>
