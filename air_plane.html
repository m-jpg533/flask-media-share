

<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

手機顯示設定
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>GLOBAL WAR COMMAND CENTER</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:black;
font-family:monospace;
overflow:hidden;
}

/* 地球畫面 */

#viewer{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

/* 上方面板 */

#topPanel{

position:absolute;
top:0;
left:0;
width:100%;
height:60px;

background:rgba(0,0,0,0.85);
color:#00ff9c;

display:flex;
justify-content:space-around;
align-items:center;

font-size:14px;
border-bottom:2px solid #00ffaa;

}

/* 底部資訊 */

#bottomPanel{

position:absolute;
bottom:0;
left:0;
width:100%;
height:80px;

background:rgba(0,0,0,0.85);
color:#00ff9c;

padding:10px;
font-size:14px;

border-top:2px solid #00ffaa;

}

</style>

</head>

<body>

<div id="topPanel">

<div>飛機: <span id="planes">0</span></div>
<div>衛星: <span id="sats">0</span></div>
<div>雷達: ACTIVE</div>

</div>

<div id="viewer"></div>

<div id="bottomPanel">

目標資訊: <span id="info">未選擇目標</span>

</div>

<script>

/* 建立3D地球 */

var viewer = new Cesium.Viewer("viewer",{

animation:false,
timeline:false,
baseLayerPicker:false,
fullscreenButton:false,
geocoder:false,
homeButton:false

})

/* 地圖 */

viewer.imageryLayers.removeAll()

viewer.imageryLayers.addImageryProvider(

new Cesium.OpenStreetMapImageryProvider({
url:"https://tile.openstreetmap.org/"
})

)

/* 地球光照 */

viewer.scene.globe.enableLighting=true

/* 鏡頭在中央 */

viewer.camera.setView({

destination:Cesium.Cartesian3.fromDegrees(90,20,25000000)

})

/* 飛機 */

let planes=[]

function addPlane(lat,lon){

let plane = viewer.entities.add({

position:Cesium.Cartesian3.fromDegrees(lon,lat,10000),

billboard:{
image:"https://cdn-icons-png.flaticon.com/512/34/34627.png",
scale:0.05
}

})

planes.push(plane)

document.getElementById("planes").innerText=planes.length

}

/* 模擬飛機 */

for(let i=0;i<300;i++){

let lat=(Math.random()*180)-90
let lon=(Math.random()*360)-180

addPlane(lat,lon)

}

/* 飛機移動 */

function movePlanes(){

planes.forEach(p=>{

let pos=p.position.getValue(Cesium.JulianDate.now())

let carto=Cesium.Cartographic.fromCartesian(pos)

let lat=Cesium.Math.toDegrees(carto.latitude)
let lon=Cesium.Math.toDegrees(carto.longitude)

lat+=Math.random()*0.5-0.25
lon+=Math.random()*0.5-0.25

p.position=Cesium.Cartesian3.fromDegrees(lon,lat,10000)

})

}

setInterval(movePlanes,2000)

/* 衛星 */

let sats=[]

function addSat(lat,lon){

let sat = viewer.entities.add({

position:Cesium.Cartesian3.fromDegrees(lon,lat,400000),

billboard:{
image:"https://cdn-icons-png.flaticon.com/512/3212/3212608.png",
scale:0.15
}

})

sats.push(sat)

document.getElementById("sats").innerText=sats.length

}

for(let i=0;i<6;i++){

let lat=(Math.random()*180)-90
let lon=(Math.random()*360)-180

addSat(lat,lon)

}

</script>

</body>
</html>
