<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>500俱樂部餐會報名</title>
<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f5f5;
}
h2 { margin-bottom: 10px; }
table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 20px;
  background: white;
}
th, td {
  border: 1px solid #888;
  padding: 8px;
  text-align: center;
}
.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
}
button {
  padding: 8px 15px;
  margin-top: 10px;
  cursor: pointer;
}
#count {
  font-size: 18px;
  color: #0077cc;
  margin-top: 10px;
}
</style>
</head>
<body>

<h2>500俱樂部餐會報名</h2>

<button onclick="lineLogin()">LINE登入</button>
<br><br>
<img id="avatarPreview" class="avatar">
<br>
姓名：
<input id="username" type="text" disabled>
<br><br>
日期：
<input id="date" type="date">
<br>
<button onclick="saveRecord()">報名</button>

<div id="count"></div>

<table>
  <thead>
    <tr>
      <th>姓名</th>
      <th>日期</th>
      <th>報名時間</th>
      <th>刪除</th>
    </tr>
  </thead>
  <tbody id="log"></tbody>
</table>

<script>
// ---------------- LINE Login 設定 ----------------
const channelID = "2009458781";  // 你的 Channel ID
const redirect = "https://m-jpg533.github.io/flask-media-share/index.html"; // 必須和 Callback URL 完全一致

function lineLogin() {
  const url =
    "https://access.line.me/oauth2/v2.1/authorize?" +
    "response_type=token" +
    "&client_id=" + channelID +
    "&redirect_uri=" + encodeURIComponent(redirect) +
    "&scope=profile%20openid" +
    "&state=12345";
  location.href = url;
}

// ---------------- 取得 LINE profile ----------------
async function getProfile() {
  const hash = location.hash;
  if (!hash) return;

  const params = new URLSearchParams(hash.substring(1));
  const token = params.get("access_token");
  if (!token) return;

  const res = await fetch("https://api.line.me/v2/profile", {
    headers: { Authorization: "Bearer " + token }
  });
  const data = await res.json();

  document.getElementById("username").value = data.displayName;
  document.getElementById("avatarPreview").src = data.pictureUrl;

  localStorage.setItem("lineAvatar", data.pictureUrl);
  localStorage.setItem("lineUserId", data.userId);

  // 清掉 hash 避免重複抓
  history.replaceState(null, null, ' ');
}

// ---------------- 報名功能 ----------------
function saveRecord() {
  const userId = localStorage.getItem("lineUserId");
  if (!userId) { alert("請先LINE登入"); return; }

  let data = JSON.parse(localStorage.getItem("records")) || [];
  const exists = data.find(r => r.userId === userId);
  if (exists) { alert("你已經報名過了"); return; }

  const record = {
    userId: userId,
    name: document.getElementById("username").value,
    avatar: localStorage.getItem("lineAvatar"),
    date: document.getElementById("date").value,
    time: new Date().toLocaleString()
  };

  data.push(record);
  localStorage.setItem("records", JSON.stringify(data));
  render();
}

// ---------------- 刪除報名 ----------------
function deleteRecord(index) {
  let data = JSON.parse(localStorage.getItem("records")) || [];
  data.splice(index, 1);
  localStorage.setItem("records", JSON.stringify(data));
  render();
}

// ---------------- 渲染表格 ----------------
function render() {
  const tbody = document.getElementById("log");
  tbody.innerHTML = "";

  const data = JSON.parse(localStorage.getItem("records")) || [];
  document.getElementById("count").innerText = "目前報名人數：" + data.length;

  data.forEach((r,index) => {
    tbody.innerHTML += `
      <tr>
        <td><img class="avatar" src="${r.avatar}">${r.name}</td>
        <td>${r.date}</td>
        <td>${r.time}</td>
        <td><button onclick="deleteRecord(${index})">🗑️</button></td>
      </tr>
    `;
  });
}

// ---------------- 初始化 ----------------
getProfile();
render();
</script>

</body>
</html>
